repos:
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.39.0
    hooks:
      - id: markdownlint
        name: MarkdownLint
        files: ^profile/.*\.md$
        args: ["--disable", "MD013", "MD033"]
  - repo: local
    hooks:
      - id: validate-profile
        name: Validate Profile
        entry: scripts/validate_profile.py
        language: python
        files: ^profile/.*\.md$
