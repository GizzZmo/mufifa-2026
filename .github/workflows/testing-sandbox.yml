name: Multi-Language Testing Sandbox

on:
  push:
    paths:
      - 'tests/**'
  pull_request:
    paths:
      - 'tests/**'

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Python Tests
        run: |
          if [ -d "tests/python" ]; then
            python -m unittest discover tests/python
          fi

  test-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run JS Tests
        run: |
          if [ -d "tests/js" ]; then
            cd tests/js && npm install && npm test
          fi

  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Run Go Tests
        run: |
          if [ -d "tests/go" ]; then
            cd tests/go && go test ./...
          fi

  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Rust Tests
        run: |
          if [ -d "tests/rust" ]; then
            cd tests/rust && cargo test
          fi
